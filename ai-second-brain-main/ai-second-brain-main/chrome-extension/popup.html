<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 300px;
      background: #0f172a;
      color: #e2e8f0;
    }
    .header {
      background: linear-gradient(135deg, #1e40af, #7c3aed);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 { font-size: 15px; font-weight: 700; }
    .header p { font-size: 11px; opacity: 0.8; }
    .emoji { font-size: 24px; }
    .body { padding: 14px; }
    .stat {
      background: #1e293b;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .stat-num { font-size: 22px; font-weight: 800; color: #60a5fa; }
    .stat-label { font-size: 11px; color: #94a3b8; }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1e293b;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .toggle-label { font-size: 13px; }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #475569;
      border-radius: 22px;
      transition: 0.3s;
    }
    .slider:before {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }
    input:checked + .slider { background: #10b981; }
    input:checked + .slider:before { transform: translateX(18px); }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: #1d4ed8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      margin-bottom: 8px;
    }
    .btn:hover { background: #2563eb; }
    .btn.secondary { background: #334155; }
    .btn.secondary:hover { background: #475569; }
    .status {
      font-size: 11px;
      color: #64748b;
      text-align: center;
      padding: 8px 0 4px;
    }
    .status.online { color: #10b981; }
    .status.offline { color: #ef4444; }
  </style>
</head>
<body>
  <div class="header">
    <div class="emoji">🧠</div>
    <div>
      <h1>AI Second Brain</h1>
      <p>Passive knowledge capture</p>
    </div>
  </div>
  <div class="body">
    <div class="stat">
      <div>
        <div class="stat-num" id="count">-</div>
        <div class="stat-label">pages captured</div>
      </div>
      <div style="font-size:24px">📚</div>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Auto-capture enabled</span>
      <label class="toggle">
        <input type="checkbox" id="enabled" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="settings-group" style="background: #1e293b; border-radius: 8px; padding: 12px; margin-bottom: 10px;">
      <div style="font-size: 11px; color: #94a3b8; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">Server Settings</div>
      <div style="margin-bottom: 8px;">
        <label for="server-url" style="display: block; font-size: 11px; color: #94a3b8; margin-bottom: 4px;">Server URL</label>
        <input type="text" id="server-url" placeholder="http://localhost:3001" style="width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 6px; padding: 6px 8px; color: #e2e8f0; font-size: 12px; outline: none; transition: border-color 0.2s;" onfocus="this.style.borderColor='#60a5fa'" onblur="this.style.borderColor='#334155'">
      </div>
      <div>
        <label for="extension-secret" style="display: block; font-size: 11px; color: #94a3b8; margin-bottom: 4px;">Access Secret</label>
        <input type="password" id="extension-secret" placeholder="Optional secret key" style="width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 6px; padding: 6px 8px; color: #e2e8f0; font-size: 12px; outline: none; transition: border-color 0.2s;" onfocus="this.style.borderColor='#60a5fa'" onblur="this.style.borderColor='#334155'">
      </div>
    </div>
    <a href="http://localhost:3001" target="_blank" class="btn" id="dashboard-btn">
      📊 Open Dashboard
    </a>
    <div class="status" id="status">Checking server...</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
